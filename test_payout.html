<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Disbursement Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            padding: 40px;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        .preview-btn {
            background-color: #007bff;
            color: white;
        }

        .disburse-btn {
            background-color: #28a745;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        pre {
            margin-top: 20px;
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Loan Disbursement</h2>

    <label>Application ID:</label>
    <input type="number" id="applicationId" placeholder="Enter Application ID" value="1">

    <label>Payment Mode:</label>
    <select id="paymentMode">
        <option value="BANK">BANK</option>
        <option value="UPI">UPI</option>
    </select>

    <button class="preview-btn" onclick="preview()">Preview Charges</button>
    <button class="disburse-btn" onclick="disburse()">Disburse Loan</button>

</div>

<script>
const BASE_URL = "http://localhost:8000/admin/disbursement";

async function preview() {
    const appId = document.getElementById("applicationId").value;

    try {
        const res = await fetch(`${BASE_URL}/${appId}`);
        const data = await res.json();
        document.getElementById("response").innerText =
            JSON.stringify(data, null, 2);
    } catch (error) {
        document.getElementById("response").innerText =
            "Error: " + error;
    }
}

async function disburse() {
    const appId = document.getElementById("applicationId").value;
    const mode = document.getElementById("paymentMode").value;

    try {
        const res = await fetch(`${BASE_URL}/${appId}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                payment_mode: mode
            })
        });

        const data = await res.json();
        document.getElementById("response").innerText =
            JSON.stringify(data, null, 2);

    } catch (error) {
        document.getElementById("response").innerText =
            "Error: " + error;
    }
}
</script>

</body>
</html>
